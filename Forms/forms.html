<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>Sports Physical Form</h2>
    <form action="actionpage.html" method="post">
        <fieldset>
            <legend>
                <h4> Athelete information</h4>
            </legend>
            <ul>
                <li>
                    <label for="name">Name:
                    </label>
                    <input type="text" name="username" id="name" />
                </li>
            </ul>
            <ul>
                <li>
                    <label for="name">School /Team:
                    </label>
                    <input type="text" name="school" id="school" />
                </li>
            </ul>
            <ul>
                <li>
                    <label for="name">Sport:
                    </label>
                    <input type="text" name="Sport" id="Sport" />
                </li>
            </ul>
            <ul>
                <li>
                    <label for="name">Parent/Guardian Name:
                    </label>
                    <input type="text" name="username" id="name" />
                </li>
            </ul>
            <ul>
                <li>
                    <label for="name">Contact Number:
                    </label>
                    <input type="text" name="username" id="name" />
                </li>
            </ul>
        </fieldset>
        <fieldset>
            <legend>
                <h4>Medical History for Athlete</h4>
            </legend>
            <ul>
                <li>
                    <label for="name">History of concussions:
                    </label>
                    <input type="radio" name="username" id="name" />Yes
                    <input type="radio" name="username" id="name" />No
                </li>
            </ul>
            <ul>
                <li>
                    <label for="name">Previous surgeries:
                    </label>
                    <input type="text" name="username" id="name" />
                </li>
            </ul>
            <ul>
                <li>
                    <label for="name">Any Bone Fractures:
                    </label>
                    <input type="radio" name="username" id="name" />Yes
                    <input type="radio" name="username" id="name" />No
                </li>
            </ul>
            <ul>
                <li>
                    <label for="name">Asthma or other breathing problems:
                    </label>
                    <input type="radio" name="username" id="name" />Yes
                    <input type="radio" name="username" id="name" />No
                </li>
            </ul>
        </fieldset>
        <fieldset>
            <legend>
                <h4>Doctor's Recommendation for Sports Participation</h4>
            </legend>
            <ul>
                <li>
                    <label for="name">Doctor's Name:
                    </label>
                    <input type="text" name="username" id="name" />
                </li>
            </ul>
        </fieldset>
        <input type="submit" value="Submit" />
    </form>

</body>

</html>
