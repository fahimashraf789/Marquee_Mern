<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        td,
        th {
            border: 1px solid;
            padding: 5px;
            text-align: center;
            font-weight: 400;
        }
        thead {
            background-color: aquamarine;
        }

        table {
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <table>
        <colgroup>
            <col style = "background-color: rgb(13, 95, 166);">
            <col style = "background-color: rgb(40, 163, 38);">
        </colgroup>
        <caption>
            This table having employee salary record
        </caption>
        <!--Table Head-->
        <thead>
            <tr>
                <th>Emp Code</th>
                <th>Emp Name</th>
                <th>Job Title</th>
                <th>Salary(LPA)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>911</td>
                <td>Lisa Dev</td>
                <td>developer</td>
                <td rowspan="2">4.5</td>
            </tr>
            <tr>
                <td>912</td>
                <td>Zoya Shakikh</td>
                <td>Tester</td>
                
            </tr>
            <tr>
                <td>913</td>
                <td>Fahim</td>
                <td>Web developer</td>
                <td>10</td>
            </tr>
        </tbody>
        <tfoot>
            
            <tr style="text-align: center;">
                <td colspan="4">This is tables footer</td>
            </tr>
        </tfoot>
    </table>
    
    
</body>
</html>
